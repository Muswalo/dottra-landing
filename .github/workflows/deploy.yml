name: Build site

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-build
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip build]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: app
        run: bun run build
        env:
          SITE_URL: https://dottra.co
          VITE_SITE_URL: https://dottra.co
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Publish build output to root
        run: |
          rsync -a --delete \
            --exclude .git \
            --exclude .github \
            --exclude .gitignore \
            --exclude app \
            --exclude dist \
            --exclude node_modules \
            app/dist/ ./

      - name: Commit build output
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No build output changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Build site [skip build]"
          git push
